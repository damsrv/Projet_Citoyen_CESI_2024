name: CICD
run-name: ${{ github.actor }} CICD
on: 
  push:
    branches:
      # - develop
      - feat/mise-en-place-cicd-integration

env:
  # POSTGRES_PRISMA_URL: ${{ vars.POSTGRES_PRISMA_URL }}
  # POSTGRES_URL_NON_POOLING: ${{ vars.POSTGRES_URL_NON_POOLING }}
  NEXT_PUBLIC_PUSHER_APP_KEY: ${{ vars.NEXT_PUBLIC_PUSHER_APP_KEY }}
  PUSHER_APP_ID: ${{ vars.PUSHER_APP_ID }}
  PUSHER_APP_SECRET: ${{ vars.PUSHER_APP_SECRET }}

jobs:
    build-project:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          # - name: Install NPM dependencies
          #   run: npm install

          # - name: Build project 
          #   run: npm run build

          - name: Set up Docker Compose
            run: docker-compose up --build -d

          # - name: Wait for services to be ready
          #   run: docker-compose exec -T postgres bash -c "while ! pg_isready; do sleep 1; done"

          - name: Set up environment variables
            run: |
              echo "POSTGRES_PRISMA_URL=postgres://postgres:secretpassword@localhost:5432/projet-citoyen" >> $GITHUB_ENV

          - name: Install NPM dependencies
            run: npm install

          - name: List running containers
            run: docker ps -a

          - name: docker-compose logs db
            run: docker-compose logs db

          - name: Wait for PostgreSQL to be ready
            run: |
              sudo apt-get install -y postgresql-client
              until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done

          - name: Check PostgreSQL status
            run: pg_isready -h localhost -p 5432 -U postgres

          - name: Prisma generate
            run: npx prisma generate

          #- run: sleep 20
          ## Commande pour lancer des test dans le futur avec JEST ?
          #- run: docker compose exec web npm run test
    
